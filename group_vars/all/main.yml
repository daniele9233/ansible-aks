kubeconfig_path: "~/.kube/config"

rancher_namespace: "cattle-system"
rancher_hostname: "rancher-iac-sviluppo.azure"
rancher_chart_version: "2.14.1"
rancher_bootstrap_password: "{{ vault_rancher_bootstrap_password }}"
rancher_ingress_tls_source: "rancher"

rancher_helm_repo_name: "rancher-stable"
rancher_helm_repo_url: "https://releases.rancher.com/server-charts/stable"
rancher_chart_ref: "rancher-stable/rancher"

cert_manager_namespace: "cert-manager"
cert_manager_chart_version: "v1.16.2"
cert_manager_helm_repo_name: "jetstack"
cert_manager_helm_repo_url: "https://charts.jetstack.io"
cert_manager_chart_ref: "jetstack/cert-manager"
