kubeconfig_path: "~/.kube/config"

rancher_namespace: "cattle-system"
# Hostname aggiornato: compatibile con wildcard *.app.iac-svil.almaviva.it
rancher_hostname: "rancher.app.iac-svil.almaviva.it"
rancher_chart_version: "2.14.1"
rancher_bootstrap_password: "{{ vault_rancher_bootstrap_password }}"
rancher_ingress_tls_source: "rancher"

rancher_helm_repo_name: "rancher-stable"
rancher_helm_repo_url: "https://releases.rancher.com/server-charts/stable"
rancher_chart_ref: "rancher-stable/rancher"

cert_manager_namespace: "cert-manager"
cert_manager_chart_version: "v1.16.2"
cert_manager_helm_repo_name: "jetstack"
cert_manager_helm_repo_url: "https://charts.jetstack.io"
cert_manager_chart_ref: "jetstack/cert-manager"

# Usato dal role rancher_CAValid_install
rancher_tls_secret_name: "tls-rancher-ingress"

# Traefik (Ingress Controller) - prerequisito per rancher_ca_valid
traefik_namespace: "traefik"
traefik_chart_version: "33.2.1"
traefik_helm_repo_name: "traefik"
traefik_helm_repo_url: "https://traefik.github.io/charts"
traefik_chart_ref: "traefik/traefik"

# IP statico riservato lato Azure per il LoadBalancer di Traefik.
# Evita che AKS riassegni un IP dinamico diverso ad ogni reinstall/upgrade.
# L'IP appartiene alla subnet della VNet del cluster (RFC1918) -> Internal LB.
# Annotation applicata al Service Traefik:
#   service.beta.kubernetes.io/azure-load-balancer-ipv4
#   service.beta.kubernetes.io/azure-load-balancer-internal
traefik_loadbalancer_ip: "10.207.201.138"
traefik_loadbalancer_internal: true

# ---------------------------------------------------------------------------
# Static PersistentVolume su Azure Managed Disk gia' esistente
# Usato dal role aks_static_pv_install (tag: aks_static_pv)
# Identificatori sensibili nel vault dedicato group_vars/all/vault_storage.yml:
#   vault_azure_subscription_id, vault_azure_resource_group, vault_azure_disk_name
# ---------------------------------------------------------------------------
aks_static_pv_name: "pv-disco-aks-test-iac"
aks_static_pvc_name: "pvc-disco-aks-test-iac"
aks_static_pvc_namespace: "default"
aks_static_pv_size: "16Gi"
aks_static_pv_access_mode: "ReadWriteOnce"
aks_static_pv_reclaim_policy: "Retain"
aks_static_pv_sku_name: "Premium_LRS"
aks_static_pv_zone: "westeurope-1"
aks_static_pv_bind_timeout: 60
aks_static_pv_labels:
  app: "disco-aks-test-iac"
  environment: "sviluppo"
  managed-by: "iac"

# volumeHandle costruito dai valori cifrati nel vault
aks_static_pv_volume_handle: >-
  /subscriptions/{{ vault_azure_subscription_id }}/resourceGroups/{{ vault_azure_resource_group }}/providers/Microsoft.Compute/disks/{{ vault_azure_disk_name }}
