---
# Entrypoint dello stack di produzione su AKS.
# La modalita' Rancher Self-Signed e' in un file SEPARATO (site-self-signed.yml)
# per evitare conflitti con la modalita' CA-Valid (stesso namespace + hostname).
#
# Esecuzione completa (full stack):
#   ansible-playbook site.yml --ask-vault-pass
#
# Componenti installati (in ordine):
#   1. Pre-installation checks       (sempre, tag: always)
#   2. Traefik Ingress Controller    (tag: traefik | rancher_ca_valid)
#   3. Rancher CA-Valid              (tag: rancher_ca_valid)
#   4. Static PV (Azure Managed Disk)(tag: aks_static_pv)
#   5. pgAdmin 4                     (tag: pgadmin)
#
# Esecuzione mirata (esempi):
#   ansible-playbook site.yml --tags traefik          # solo Traefik
#   ansible-playbook site.yml --tags rancher_ca_valid # Traefik + Rancher
#   ansible-playbook site.yml --tags aks_static_pv    # solo Static PV
#   ansible-playbook site.yml --tags pgadmin          # solo pgAdmin
#   (i pre-check girano comunque grazie a tag 'always')
#
# Dry-run:
#   ansible-playbook site.yml --check --diff --ask-vault-pass
#
# Vault prereq (cifrati con la stessa password):
#   group_vars/all/vault.yml          (segreti generici)
#   group_vars/all/vault_cavalid.yml  (fullchain TLS wildcard *.app.iac-svil.almaviva.it)
#   group_vars/all/vault_storage.yml  (Azure Managed Disk identifiers)
#   group_vars/all/vault_pgadmin.yml  (admin email/password pgAdmin)

- name: Install full stack on AKS (Traefik + Rancher CA-Valid + Static PV + pgAdmin)
  hosts: localhost
  gather_facts: no
  tasks:
    # -------------------------------------------------------------------------
    # PRE-CHECK (gira sempre, anche con --tags X mirato)
    # -------------------------------------------------------------------------
    - name: Pre-installation checks
      ansible.builtin.import_role:
        name: requisrment_preinstall
        tasks_from: requisiti.yml
      tags:
        - always

    # -------------------------------------------------------------------------
    # 1) Traefik (Ingress Controller, prerequisito di Rancher CA-Valid e pgAdmin)
    #    Tag 'traefik' per esecuzione standalone, 'rancher_ca_valid' per essere
    #    incluso automaticamente quando si chiede l'install Rancher.
    # -------------------------------------------------------------------------
    - name: Install Traefik Ingress Controller
      ansible.builtin.import_role:
        name: traefik_install
      tags:
        - rancher_ca_valid
        - traefik

    # -------------------------------------------------------------------------
    # 2) Rancher con certificato CA valido (wildcard *.app.iac-svil.almaviva.it)
    # -------------------------------------------------------------------------
    - name: Install Rancher (CA valid cert -- *.app.iac-svil.almaviva.it)
      ansible.builtin.import_role:
        name: rancher_CAValid_install
        tasks_from: 00-rancher-CAValid-install.yml
      tags:
        - rancher_ca_valid

    # -------------------------------------------------------------------------
    # 3) Static PersistentVolume bound a un Azure Managed Disk esistente
    # -------------------------------------------------------------------------
    - name: Create static PersistentVolume bound to existing Azure Managed Disk
      ansible.builtin.import_role:
        name: aks_static_pv_install
      tags:
        - aks_static_pv

    # -------------------------------------------------------------------------
    # 4) pgAdmin 4 (GUI web per database PostgreSQL ESTERNI)
    #    Richiede Traefik (Ingress) e il wildcard TLS di vault_cavalid.yml.
    #    La PVC pvc-pgadmin (4Gi, managed-csi) viene creata dal role stesso.
    # -------------------------------------------------------------------------
    - name: Install pgAdmin 4 (web admin per PostgreSQL esterni)
      ansible.builtin.import_role:
        name: pgadmin_install
      tags:
        - pgadmin
