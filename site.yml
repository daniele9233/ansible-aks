---
# Entrypoint orchestrator.
#
# Scegli il metodo TLS tramite tag:
#
#   Certificato self-signed (cert-manager):
#     ansible-playbook site.yml --tags rancher_self_signed --vault-password-file .vault_pass
#
#   Certificato CA valido (*.app.iac-svil.almaviva.it) + Traefik ingress:
#     ansible-playbook site.yml --tags rancher_ca_valid --vault-password-file .vault_pass
#
#   Solo Traefik (utile per provisioning standalone):
#     ansible-playbook site.yml --tags traefik --vault-password-file .vault_pass
#
#   Static PV su Azure Managed Disk gia' esistente (provisioning statico):
#     ansible-playbook site.yml --tags aks_static_pv --vault-password-file .vault_pass
#
# Prima di usare rancher_ca_valid: completare il fullchain in vault_cavalid.yml
#   e cifrarlo con ansible-vault.
# Prima di usare aks_static_pv: completare e cifrare il vault dedicato
#   group_vars/all/vault_storage.yml (variabili vault_azure_subscription_id,
#   vault_azure_resource_group, vault_azure_disk_name).

- name: Install Rancher on AKS
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Pre-installation checks
      ansible.builtin.import_role:
        name: requisrment_preinstall
        tasks_from: requisiti.yml

    # -------------------------------------------------------------------------
    # OPZIONE A: Rancher con certificato self-signed gestito da cert-manager
    # -------------------------------------------------------------------------
    - name: Install Rancher (self-signed / cert-manager)
      ansible.builtin.import_role:
        name: rancher_install
        tasks_from: 00-rancher-install.yml
      tags:
        - rancher_self_signed
        - never

    # -------------------------------------------------------------------------
    # OPZIONE B: Traefik (Ingress Controller) + Rancher CA valida
    # I tag sono condivisi: --tags rancher_ca_valid esegue entrambi in ordine.
    # --tags traefik esegue solo Traefik.
    # -------------------------------------------------------------------------
    - name: Install Traefik Ingress Controller
      ansible.builtin.import_role:
        name: traefik_install
      tags:
        - rancher_ca_valid
        - traefik
        - never

    - name: Install Rancher (CA valid cert -- *.app.iac-svil.almaviva.it)
      ansible.builtin.import_role:
        name: rancher_CAValid_install
        tasks_from: 00-rancher-CAValid-install.yml
      tags:
        - rancher_ca_valid
        - never

    # -------------------------------------------------------------------------
    # OPZIONE C: Static PersistentVolume bound a un Azure Managed Disk esistente
    # Provisioning statico: niente StorageClass, ciclo di vita del disco fuori IaC.
    # -------------------------------------------------------------------------
    - name: Create static PersistentVolume bound to existing Azure Managed Disk
      ansible.builtin.import_role:
        name: aks_static_pv_install
      tags:
        - aks_static_pv
        - never
