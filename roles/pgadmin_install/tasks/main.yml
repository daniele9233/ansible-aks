---
# Installa pgAdmin 4 come GUI web per database PostgreSQL ESTERNI (standalone:
# nessun Postgres nel cluster). Esposto via Traefik Ingress su
# pgadmin.app.iac-svil.almaviva.it con il cert wildcard AlmavivA
# *.app.iac-svil.almaviva.it (stesso usato per Rancher CA Valid).
#
# Persistenza: PVC DEDICATA "{{ pgadmin_pvc_name }}" creata dal role con la
# StorageClass managed-csi di AKS (provisioning dinamico, un Azure Disk
# Premium SSD da {{ pgadmin_pvc_size }}). Nessuna dipendenza dal disco
# statico pvc-disco-aks-test-iac: ogni app ha il suo disco indipendente.
#
# Credenziali admin nel vault dedicato:
#   group_vars/all/vault_pgadmin.yml
#     vault_pgadmin_admin_email
#     vault_pgadmin_admin_password
#
# Esecuzione:
#   ansible-playbook site.yml --tags pgadmin --ask-vault-pass
#
# Prerequisiti:
#   - Traefik installato (--tags traefik)
#   - vault_cavalid.yml decifrabile (serve il fullchain TLS wildcard)
#   - vault_pgadmin.yml cifrato e compilato

# ---------------------------------------------------------------------------
# STEP 0 — Namespace dedicato
# ---------------------------------------------------------------------------
- name: Ensure namespace "{{ pgadmin_namespace }}" exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ pgadmin_namespace }}"
        labels: "{{ pgadmin_labels }}"

# ---------------------------------------------------------------------------
# STEP 1 — PVC dedicata (managed-csi, dynamic provisioning)
# ---------------------------------------------------------------------------
# La StorageClass managed-csi di AKS usa volumeBindingMode: WaitForFirstConsumer.
# La PVC resta Pending finche' un pod che la referenzia non viene schedulato:
# per questo il "wait for Bound" e' spostato DOPO la creazione del Deployment.
- name: Apply PersistentVolumeClaim "{{ pgadmin_pvc_name }}"
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ pgadmin_pvc_name }}"
        namespace: "{{ pgadmin_namespace }}"
        labels: "{{ pgadmin_labels }}"
      spec:
        accessModes:
          - "{{ pgadmin_pvc_access_mode }}"
        storageClassName: "{{ pgadmin_pvc_storage_class }}"
        resources:
          requests:
            storage: "{{ pgadmin_pvc_size }}"
  when: not ansible_check_mode

# ---------------------------------------------------------------------------
# STEP 2 — TLS Secret nel namespace di pgAdmin (copia del wildcard AlmavivA)
# ---------------------------------------------------------------------------
# Gli Ingress sono namespaced: per terminare TLS in "{{ pgadmin_namespace }}"
# serve un Secret separato con lo stesso fullchain wildcard di Rancher.
- name: Create / update TLS secret "{{ pgadmin_tls_secret_name }}"
  no_log: true
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ pgadmin_tls_secret_name }}"
        namespace: "{{ pgadmin_namespace }}"
        labels: "{{ pgadmin_labels }}"
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ vault_rancher_tls_crt_chain | b64encode }}"
        tls.key: "{{ vault_rancher_tls_key | b64encode }}"
  when: not ansible_check_mode

# ---------------------------------------------------------------------------
# STEP 3 — Secret credenziali admin (PGADMIN_DEFAULT_EMAIL/PASSWORD)
# ---------------------------------------------------------------------------
- name: Create / update pgAdmin admin Secret "{{ pgadmin_admin_secret_name }}"
  no_log: true
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ pgadmin_admin_secret_name }}"
        namespace: "{{ pgadmin_namespace }}"
        labels: "{{ pgadmin_labels }}"
      type: Opaque
      stringData:
        PGADMIN_DEFAULT_EMAIL: "{{ pgadmin_admin_email }}"
        PGADMIN_DEFAULT_PASSWORD: "{{ pgadmin_admin_password }}"
  when: not ansible_check_mode

# ---------------------------------------------------------------------------
# STEP 4 — Deployment pgAdmin (1 replica, mount diretto sulla PVC dedicata)
# ---------------------------------------------------------------------------
- name: Apply Deployment "pgadmin"
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: pgadmin
        namespace: "{{ pgadmin_namespace }}"
        labels: "{{ pgadmin_labels }}"
      spec:
        replicas: "{{ pgadmin_replicas }}"
        # Recreate: il vecchio pod viene terminato prima di crearne uno nuovo.
        # Obbligatorio con PVC RWO + single replica (no rolling update).
        strategy:
          type: Recreate
        selector:
          matchLabels:
            app: pgadmin
        template:
          metadata:
            labels: "{{ pgadmin_labels }}"
          spec:
            securityContext:
              # L'immagine ufficiale dpage/pgadmin4 gira come uid 5050 (pgadmin).
              # fsGroup: il volume montato eredita ownership 5050 ricorsivamente
              # (la PVC e' dedicata, niente subPath -> niente fix permissions).
              runAsUser: 5050
              runAsGroup: 5050
              fsGroup: 5050
            containers:
              - name: pgadmin
                image: "{{ pgadmin_image }}"
                imagePullPolicy: IfNotPresent
                ports:
                  - name: http
                    containerPort: 80
                envFrom:
                  - secretRef:
                      name: "{{ pgadmin_admin_secret_name }}"
                env:
                  - name: PGADMIN_LISTEN_PORT
                    value: "80"
                  # pgAdmin dietro un reverse proxy (Traefik) -> conta gli header
                  # X-Forwarded-For / X-Forwarded-Proto per generare URL corretti.
                  - name: PGADMIN_CONFIG_PROXY_X_FOR_COUNT
                    value: "1"
                  - name: PGADMIN_CONFIG_PROXY_X_PROTO_COUNT
                    value: "1"
                  - name: PGADMIN_CONFIG_PROXY_X_HOST_COUNT
                    value: "1"
                  - name: PGADMIN_CONFIG_PROXY_X_PORT_COUNT
                    value: "1"
                  - name: PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT
                    value: "1"
                volumeMounts:
                  - name: pgadmin-data
                    mountPath: /var/lib/pgadmin
                resources:
                  requests:
                    cpu: "{{ pgadmin_cpu_request }}"
                    memory: "{{ pgadmin_memory_request }}"
                  limits:
                    cpu: "{{ pgadmin_cpu_limit }}"
                    memory: "{{ pgadmin_memory_limit }}"
                readinessProbe:
                  httpGet:
                    path: /misc/ping
                    port: http
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
                livenessProbe:
                  httpGet:
                    path: /misc/ping
                    port: http
                  initialDelaySeconds: 120
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
            volumes:
              - name: pgadmin-data
                persistentVolumeClaim:
                  claimName: "{{ pgadmin_pvc_name }}"
  when: not ansible_check_mode

# ---------------------------------------------------------------------------
# STEP 4.5 — Attendi che la PVC passi in Bound (sbloccata dal Deployment)
# ---------------------------------------------------------------------------
# Con managed-csi (WaitForFirstConsumer) la PVC resta Pending finche' kube
# scheduler non assegna un pod a un nodo: a quel punto AKS provisiona il
# disco Azure e fa il bind. Controlliamo qui, dopo il Deployment.
- name: Wait for PVC "{{ pgadmin_pvc_name }}" to be Bound
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    kind: PersistentVolumeClaim
    name: "{{ pgadmin_pvc_name }}"
    namespace: "{{ pgadmin_namespace }}"
  register: pgadmin_pvc_status
  retries: 30
  delay: 5
  until:
    - pgadmin_pvc_status.resources | length > 0
    - pgadmin_pvc_status.resources[0].status.phase | default('') == 'Bound'
  when: not ansible_check_mode

# ---------------------------------------------------------------------------
# STEP 5 — Service ClusterIP (esposto solo internamente, l'Ingress fa il resto)
# ---------------------------------------------------------------------------
- name: Apply Service "pgadmin"
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: pgadmin
        namespace: "{{ pgadmin_namespace }}"
        labels: "{{ pgadmin_labels }}"
      spec:
        type: ClusterIP
        selector:
          app: pgadmin
        ports:
          - name: http
            port: 80
            targetPort: http
  when: not ansible_check_mode

# ---------------------------------------------------------------------------
# STEP 6 — Ingress Traefik con TLS termination (cert wildcard AlmavivA)
# ---------------------------------------------------------------------------
- name: Apply Ingress "pgadmin"
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: pgadmin
        namespace: "{{ pgadmin_namespace }}"
        labels: "{{ pgadmin_labels }}"
        annotations:
          kubernetes.io/ingress.class: "{{ pgadmin_ingress_class }}"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.tls: "true"
      spec:
        ingressClassName: "{{ pgadmin_ingress_class }}"
        tls:
          - hosts:
              - "{{ pgadmin_hostname }}"
            secretName: "{{ pgadmin_tls_secret_name }}"
        rules:
          - host: "{{ pgadmin_hostname }}"
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: pgadmin
                      port:
                        number: 80
  when: not ansible_check_mode

# ---------------------------------------------------------------------------
# STEP 7 — Attendi il rollout del Deployment
# ---------------------------------------------------------------------------
- name: Wait for pgadmin deployment rollout
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    kind: Deployment
    name: pgadmin
    namespace: "{{ pgadmin_namespace }}"
  register: pgadmin_deploy
  retries: 60
  delay: 10
  until:
    - pgadmin_deploy.resources | length > 0
    - pgadmin_deploy.resources[0].status.readyReplicas | default(0) == pgadmin_deploy.resources[0].spec.replicas
  when: not ansible_check_mode

# ---------------------------------------------------------------------------
# STEP 8 — Riepilogo
# ---------------------------------------------------------------------------
- name: pgAdmin installation summary
  ansible.builtin.debug:
    msg:
      - "pgAdmin 4 installato nel namespace '{{ pgadmin_namespace }}'"
      - "URL:        https://{{ pgadmin_hostname }} (cert wildcard AlmavivA)"
      - "Image:      {{ pgadmin_image }}"
      - "Storage:    PVC '{{ pgadmin_pvc_name }}' ({{ pgadmin_pvc_size }}, {{ pgadmin_pvc_storage_class }})"
      - "TLS secret: '{{ pgadmin_tls_secret_name }}' (mirror del wildcard in '{{ pgadmin_namespace }}')"
      - "Admin user: nel vault group_vars/all/vault_pgadmin.yml"
      - "Replicas:   {{ pgadmin_deploy.resources[0].status.readyReplicas | default(0) }}/{{ pgadmin_deploy.resources[0].spec.replicas }}"
  when: not ansible_check_mode

- name: pgAdmin dry-run summary
  ansible.builtin.debug:
    msg:
      - "[DRY-RUN] pgAdmin sarebbe installato in '{{ pgadmin_namespace }}'"
      - "Hostname:   https://{{ pgadmin_hostname }}"
      - "Image:      {{ pgadmin_image }}"
      - "Storage:    PVC '{{ pgadmin_pvc_name }}' ({{ pgadmin_pvc_size }}, {{ pgadmin_pvc_storage_class }})"
      - "Ingress:    TLS via Secret '{{ pgadmin_tls_secret_name }}' (creato dal role)"
  when: ansible_check_mode
