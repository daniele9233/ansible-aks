---
# Pre-installation checks. Read-only, idempotenti.
# Verifica binari + connettivita' cluster + Python deps richiesti
# da kubernetes.core.
# check_mode: no sui check read-only -> eseguono anche in --check mode.

- name: Check helm binary present
  ansible.builtin.command: helm version --short
  register: helm_check
  changed_when: false
  failed_when: false
  check_mode: no

- name: Install helm via script ufficiale (se mancante)
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    executable: /bin/bash
  become: true
  when: helm_check.rc != 0
  register: helm_install
  changed_when: helm_install.rc == 0

- name: Re-verify helm after install
  ansible.builtin.command: helm version --short
  register: helm_check_after
  changed_when: false
  failed_when: helm_check_after.rc != 0
  when: helm_check.rc != 0
  check_mode: no

- name: Set helm version fact
  ansible.builtin.set_fact:
    helm_version_str: "{{ helm_check_after.stdout | default(helm_check.stdout | default('unknown')) }}"

- name: Check kubectl binary present
  ansible.builtin.command: kubectl version --client
  register: kubectl_check
  changed_when: false
  failed_when: kubectl_check.rc != 0
  check_mode: no

- name: Check Python `kubernetes` package importable
  ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c \"import kubernetes; print(kubernetes.__version__)\""
  register: py_k8s_check
  changed_when: false
  failed_when: py_k8s_check.rc != 0
  check_mode: no

- name: Check kubeconfig file exists
  ansible.builtin.stat:
    path: "{{ kubeconfig_path | expanduser }}"
  register: kubeconfig_stat
  failed_when: not kubeconfig_stat.stat.exists

- name: Verify cluster is reachable (list nodes)
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path | expanduser }}"
    kind: Node
  register: cluster_nodes
  failed_when: cluster_nodes.resources | length == 0

- name: Get cluster Kubernetes version
  ansible.builtin.command: kubectl --kubeconfig {{ kubeconfig_path | expanduser }} version -o json
  register: kubectl_version_raw
  changed_when: false
  failed_when: kubectl_version_raw.rc != 0
  check_mode: no

- name: Parse server version
  ansible.builtin.set_fact:
    cluster_k8s_version: "{{ (kubectl_version_raw.stdout | from_json).serverVersion.gitVersion | default('unknown') }}"

- name: Pre-flight summary
  ansible.builtin.debug:
    msg:
      - "helm:           {{ helm_version_str }}"
      - "python k8s:     {{ py_k8s_check.stdout }}"
      - "kubeconfig:     {{ kubeconfig_path | expanduser }}"
      - "cluster nodes:  {{ cluster_nodes.resources | length }}"
      - "cluster K8s:    {{ cluster_k8s_version }}"
      - "rancher target: {{ rancher_chart_version }}"
      - "cert-manager:   {{ cert_manager_chart_version }}"
      - "Verificare compatibilita' su https://www.suse.com/suse-rancher/support-matrix/"
